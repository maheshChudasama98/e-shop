stages:
  - build
  - deploy

variables:
  NODE_VERSION: "18"

build:
  stage: build
  image: node:${NODE_VERSION}
  cache:
    paths:
      - node_modules/
  script:
    - npm install
    - npm run build:live
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  only:
    - main
    - master

deploy:
  stage: deploy
  script:
    - echo "Deploy your dist folder to your server here"
    # Add your deployment commands here
  dependencies:
    - build
  only:
    - main
    - master 